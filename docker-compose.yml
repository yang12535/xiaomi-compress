version: "3.8"
services:
  video-compress:
    container_name: xiaomi-compress
    image: jrottenberg/ffmpeg:6.1-ubuntu2204
    entrypoint: ["/bin/bash", "/compress.sh"]
    volumes:
      - ./input:/input          # 放置待压缩的 mov 文件
      - ./output:/output        # 压缩后的 mkv 输出
      - ./logs:/logs            # 日志文件
      - ./compress.sh:/compress.sh:ro
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 4G
    restart: "no"
